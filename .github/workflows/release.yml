# Builds installers for all three platforms and attaches them to one GitHub
# release (created as a draft; publish it once every platform has uploaded).
# Trigger: push a v* tag, or run manually from the Actions tab.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile workspace packages
        run: npx tsc -b

      - name: Bundle the infra MCP (ships as an extraResource)
        run: npm run bundle -w @vo-coder/infra-mcp

      - name: Build renderer + main
        run: npm run build -w @vo-coder/desktop

      # npm ci on the arm64 runner only installs the darwin-arm64 node-pty
      # prebuild; the x64 DMG needs its sibling too. Unpack the tarball straight
      # into node_modules — `npm install --cpu=x64` would re-reify the tree and
      # prune the arm64 prebuild as "wrong platform".
      - name: Add x64 node-pty prebuild for the Intel Mac build
        if: matrix.os == 'macos-latest'
        run: |
          # fs read, not require(): the package's exports map hides package.json
          V=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/@lydell/node-pty/package.json','utf8')).optionalDependencies['@lydell/node-pty-darwin-x64']")
          npm pack "@lydell/node-pty-darwin-x64@$V"
          mkdir -p node_modules/@lydell/node-pty-darwin-x64
          tar -xzf lydell-node-pty-darwin-x64-*.tgz -C node_modules/@lydell/node-pty-darwin-x64 --strip-components=1
          rm lydell-node-pty-darwin-x64-*.tgz

      # Mac signing is ad-hoc (identity: '-' in electron-builder.yml) — no
      # Apple certificate involved, but the bundle is no longer "damaged".
      - name: Package and upload installers
        working-directory: apps/desktop
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
