# Builds installers for all three platforms and attaches them to one GitHub
# release (created as a draft; publish it once every platform has uploaded).
# Trigger: push a v* tag, or run manually from the Actions tab.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile workspace packages
        run: npx tsc -b

      - name: Bundle the infra MCP (ships as an extraResource)
        run: npm run bundle -w @vo-coder/infra-mcp

      - name: Build renderer + main
        run: npm run build -w @vo-coder/desktop

      - name: Package and upload installers
        working-directory: apps/desktop
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple certificate — ship the mac build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
